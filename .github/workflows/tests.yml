name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: PHP ${{ matrix.php }} — CI4 Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sqlite3, gd, mbstring, intl, json, curl, fileinfo
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Setup environment
        run: |
          cp env .env
          echo "CI_ENVIRONMENT = testing" >> .env
          mkdir -p writable/cache writable/logs writable/session writable/debugbar
          chmod -R 777 writable

      - name: PHP Syntax Check
        run: find app tests -name "*.php" -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || true

      - name: Run Migrations
        run: php spark migrate --all

      - name: Run Seeder
        run: php spark db:seed HindBiharSeeder

      - name: Run PHPUnit
        run: php vendor/bin/phpunit --no-coverage
